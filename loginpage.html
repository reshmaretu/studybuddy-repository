<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - StudyBuddy</title>
    <link rel="stylesheet" href="loginpage.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="full-page-container">
        <main class="login-section">
            <div class="form-wrapper">
                <h1>Welcome back!</h1>
                <p class="subtitle">Simplify your workflow and boost your productivity with <strong>StudyBuddy</strong>. Get started for free.</p>

                <form>
                    <input type="email" placeholder="Email" class="input-field">
                    <div class="password-wrapper">
                        <input type="password" placeholder="Password" class="input-field">
                    </div>
                    
                    <div class="forgot-link">
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="login-btn">Login</button>
                </form>

                <div class="divider">or continue with</div>

                <div class="social-icons">
                    <div class="icon-circle">G</div>
                    <div class="icon-circle">A</div>
                    <div class="icon-circle">F</div>
                </div>

                <p class="footer-text">Not a member? <a href="registerpage.html">Register now</a></p>
            </div>
        </main>

        <section class="promo-section">
            <div class="promo-inner">
                <div class="img-container">
                    <img src="your-illustration.png" alt="Task Management Illustration" class="hero-img">
                </div>
                <h2>Make your work easier and organized with <strong>StudyBuddy</strong></h2>
                <div class="dots">
                    <span class="dot"></span>
                    <span class="dot active"></span>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
